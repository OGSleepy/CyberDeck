@tailwind base;
@tailwind components;
@tailwind utilities;
@layer base {
  :root {
    --background: 0 0% 100%;
    --foreground: 222.2 84% 4.9%;
    --card: 0 0% 100%;
    --card-foreground: 222.2 84% 4.9%;
    --popover: 0 0% 100%;
    --popover-foreground: 222.2 84% 4.9%;
    --primary: 222.2 47.4% 11.2%;
    --primary-foreground: 210 40% 98%;
    --secondary: 210 40% 96.1%;
    --secondary-foreground: 222.2 47.4% 11.2%;
    --muted: 210 40% 96.1%;
    --muted-foreground: 215.4 16.3% 46.9%;
    --accent: 210 40% 96.1%;
    --accent-foreground: 222.2 47.4% 11.2%;
    --destructive: 0 84.2% 60.2%;
    --destructive-foreground: 210 40% 98%;
    --border: 214.3 31.8% 91.4%;
    --input: 214.3 31.8% 91.4%;
    --ring: 222.2 84% 4.9%;
    --radius: 0.75rem;
    --sidebar-background: 0 0% 98%;
    --sidebar-foreground: 240 5.3% 26.1%;
    --sidebar-primary: 240 5.9% 10%;
    --sidebar-primary-foreground: 0 0% 98%;
    --sidebar-accent: 240 4.8% 95.9%;
    --sidebar-accent-foreground: 240 5.9% 10%;
    --sidebar-border: 220 13% 91%;
    --sidebar-ring: 217.2 91.2% 59.8%;
  }
  .dark {
    --background: 120 10% 5%;
    --foreground: 120 20% 85%;
    --card: 120 15% 8%;
    --card-foreground: 120 20% 85%;
    --popover: 120 15% 8%;
    --popover-foreground: 120 20% 85%;
    --primary: 120 100% 45%;
    --primary-foreground: 120 10% 5%;
    --secondary: 120 15% 15%;
    --secondary-foreground: 120 20% 85%;
    --muted: 120 10% 12%;
    --muted-foreground: 120 10% 50%;
    --accent: 120 80% 40%;
    --accent-foreground: 120 10% 5%;
    --destructive: 0 70% 50%;
    --destructive-foreground: 0 0% 98%;
    --border: 120 15% 15%;
    --input: 120 15% 15%;
    --ring: 120 100% 45%;
    --sidebar-background: 120 15% 6%;
    --sidebar-foreground: 120 20% 85%;
    --sidebar-primary: 120 100% 45%;
    --sidebar-primary-foreground: 120 10% 5%;
    --sidebar-accent: 120 15% 12%;
    --sidebar-accent-foreground: 120 20% 85%;
    --sidebar-border: 120 15% 15%;
    --sidebar-ring: 120 100% 45%;
  }
}
@layer base {
  * {
    @apply border-border;
  }
  body {
    @apply bg-background text-foreground;
  }
}
@layer utilities {
  .glow-text {
    text-shadow: 0 0 10px hsl(var(--primary));
  }
  .glow-border {
    box-shadow: 0 0 10px hsla(var(--primary), 0.3);
  }
  @keyframes blink {
    0%, 49% {
      opacity: 1;
    }
    50%, 100% {
      opacity: 0;
    }
  }
  .terminal-cursor::after {
    content: "\258a";
    animation: blink 1s infinite;
    color: hsl(var(--primary));
  }
  @keyframes matrix-fall {
    0% {
      transform: translateY(-10px);
      opacity: 0;
    }
    10% {
      opacity: 1;
    }
    90% {
      opacity: 1;
    }
    100% {
      transform: translateY(10px);
      opacity: 0;
    }
  }
  .matrix-text {
    animation: matrix-fall 2s ease-in-out;
  }
  @keyframes scanline {
    0% {
      transform: translateY(-100%);
    }
    100% {
      transform: translateY(100%);
    }
  }
  .dark ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  .dark ::-webkit-scrollbar-track {
    background: hsl(var(--muted));
  }
  .dark ::-webkit-scrollbar-thumb {
    background: hsl(var(--primary));
    border-radius: 4px;
  }
  .dark ::-webkit-scrollbar-thumb:hover {
    background: hsl(var(--primary) / 0.8);
  }
}
